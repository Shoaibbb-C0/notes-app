<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOTED</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app">

      <!-- Auth Section -->
      <div id="auth-section">
        <div class="wordmark">NOTED</div>
        <p class="tagline">// capture everything</p>
        <input type="email" id="email" placeholder="your@email.com" />
        <input type="password" id="password" placeholder="password" />
        <div class="auth-buttons">
          <button id="signup-btn">Create account</button>
          <button id="login-btn">Sign in →</button>
        </div>
      </div>

      <!-- Notes Section -->
      <div id="notes-section" style="display:none">
        <div class="notes-header">
          <div class="notes-title">NOTED</div>
          <button id="logout-btn">sign out</button>
        </div>

        <div id="create-note">
          <input type="text" id="note-title" placeholder="Title your thought..." />
          <textarea id="note-content" placeholder="Write anything..."></textarea>
          <button id="create-btn">+ Add note</button>
        </div>

        <div id="notes-list"></div>
      </div>

    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
